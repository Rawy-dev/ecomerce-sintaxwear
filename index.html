<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintaxwear - tenis e sneakers online</title>
    <link rel="stylesheet" href="./css/variabbles.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/hero.css">
</head>

<body>
    <!-- Header e Navegação -->
    <header class="header">
        <h1 class="logo">

            <a href="/" title="Sintaxwear - tenis e sneakers online">
                <img src="./images/logo/Logo.svg" alt="Sintaxwear - tenis e sneakers online">
            </a>
        </h1>

        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>

        </nav>

        <nav class="nav-right" aria-label="Menu Secundário">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#" aria-label="Acessar perfil do usuário"><img src="./images/icones/perfil.svg"
                            alt="Perfil"></a>
                </li>
                <li><a href="#" aria-label="Abrir ajuda e suporte"><img src="./images/icones/ajuda.svg" alt="Ajuda"></a>
                </li>
                <li><a href="#" aria-label="Ir para carrinho de compras"><img src="./images/icones/carrinho.svg"
                            alt="Carrinho"></a>
                </li>

            </ul>
        </nav>
    </header>

    <!-- Conteúdo Principal -->
    <main>
        <!-- Banner Principal -->
        <section class="hero-section">
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença</h2>

                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#"> Ver modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>

                    </div>
                </div>
            </div>
        </section>

        <!-- Seção de Categorias -->
        <section class="categorias"></section>

        <!-- Produtos em Destaque -->
        <section class="produtos-destaque"></section>

        <!-- Seção de Promoções -->
        <section class="promocoes"></section>
    </main>

    <!-- Footer -->
    <footer></footer>
</body>

</html>
