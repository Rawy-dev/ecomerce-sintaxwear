<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sintaxwear é a sua loja online de tênis e sneakers, oferecendo uma ampla seleção de calçados estilosos e confortáveis para todas as ocasiões.">
    <title>Sintaxwear - tenis e sneakers online</title>
    <link rel="stylesheet" href="./css/variabbles.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/hero.css">
    <link rel="stylesheet" href="./css/components/categorys.css">
    <link rel="stylesheet" href="./css/components/products.css">
</head>

<body>
    <!-- Header e Navegação -->
    <header class="header">
        <h1 class="logo">

            <a href="/" title="Sintaxwear - tenis e sneakers online">
                <img src="./images/logo/Logo.svg" alt="Sintaxwear - tenis e sneakers online">
            </a>
        </h1>

        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>

        </nav>

        <nav class="nav-right" aria-label="Menu Secundário">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#" aria-label="Acessar perfil do usuário"><img src="./images/icones/perfil.svg"
                            alt="Perfil"></a>
                </li>
                <li><a href="#" aria-label="Abrir ajuda e suporte"><img src="./images/icones/ajuda.svg" alt="Ajuda"></a>
                </li>
                <li><a href="#" aria-label="Ir para carrinho de compras"><img src="./images/icones/carrinho.svg"
                            alt="Carrinho"></a>
                </li>

            </ul>
        </nav>
    </header>

    <!-- Conteúdo Principal -->
    <main>
        <!-- Banner Principal -->
        <section class="hero-section">
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença</h2>

                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#"> Ver modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>

                    </div>
                </div>
            </div>
        </section>

        <!-- Seção de Categorias -->
        <section class="category-section">
            <div class="category-card casual">
                <a href="#" class="cateory-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Casual</span>
                </a>

            </div>
            <div class="category-card esporte">
                <a href="#" class="cateory-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Esporte</span>
                </a>

            </div>
            <div class="category-card moderno">
                <a href="#" class="cateory-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Moderno</span>
                </a>
            </div>
            <div class="category-card futurista">
                <a href="#" class="cateory-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Futurista</span>
                </a>

            </div>

        </section>

        <!-- Produtos em Destaque -->
        <section class="grid-section">
            

                <div class="card top1">
                    <div class="top1-content">
                        <h3 class="card-title">Krypton One</h3>
                        <p class="card-subtitle">Estilo Urbano com atitude.</p>
                        <div class="cta-group">
                            <a href="#" class="btn btn-outline">Feminino</a>
                            <a href="#" class="btn btn-outline">Masculino</a>
                        </div>
                    </div>
                </div>
                <div class="card top2"></div>
                <div class="card midL"></div>
                <div class="card midR"></div>
                <div class="card bottomL"></div>
                <div class="card bottomR"></div>
           
        </section>

    </main>

    <!-- Footer -->
    <footer></footer>
</body>

</html>
